name: Test

on:
  workflow_call:
    inputs:
      matrix:
        description: |
          JSON `strategy.matrix` value, normally produced by scripts/tox_matrix.py
          in the `prepare` job of ci.yml. Must be of the form
          `{"include": [{"name": ..., "tox_env": ..., "python_version": ...,
          "needs_weaver": <optional bool>}, ...]}`.
        required: true
        type: string

permissions:
  contents: read

env:
  # Set the SHA to the branch name if the PR has a label 'prepare-release' or 'backport' otherwise, set it to 'main'
  # For PRs you can change the inner fallback ('main')
  # For pushes you change the outer fallback ('main')
  # The logic below is used during releases and depends on having an equivalent branch name in the core repo.
  CORE_REPO_SHA: ${{ github.event_name == 'pull_request' && (
       contains(github.event.pull_request.labels.*.name, 'prepare-release') && github.event.pull_request.head.ref ||
       contains(github.event.pull_request.labels.*.name, 'backport') && github.event.pull_request.base.ref ||
       'main'
    ) || 'main' }}
  CONTRIB_REPO_SHA: main
  PIP_EXISTS_ACTION: w

jobs:

  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(inputs.matrix) }}
    steps:
      - name: Checkout repo @ SHA - ${{ github.sha }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python_version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "${{ matrix.python_version }}"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Read pinned weaver version
        if: ${{ matrix.needs_weaver }}
        id: versions
        run: |
          # shellcheck disable=SC2002
          cat versions.env | grep -E '^WEAVER_VERSION=' >> "$GITHUB_OUTPUT"

      - name: Install weaver ${{ steps.versions.outputs.WEAVER_VERSION }}
        if: ${{ matrix.needs_weaver }}
        env:
          WEAVER_VERSION: ${{ steps.versions.outputs.WEAVER_VERSION }}
        run: |
          WEAVER_ASSET="weaver-x86_64-unknown-linux-gnu"
          WEAVER_URL="https://github.com/open-telemetry/weaver/releases/download/${WEAVER_VERSION}/${WEAVER_ASSET}.tar.xz"
          curl -sSL "$WEAVER_URL" | tar -xJ -C /tmp "${WEAVER_ASSET}/weaver"
          sudo mv "/tmp/${WEAVER_ASSET}/weaver" /usr/local/bin/weaver
          weaver --version

      - name: Run tests
        run: uvx --with tox-uv tox -e ${{ matrix.tox_env }} -- -ra
