name: "[Package] Prepare patch release"
on:
  workflow_dispatch:
    inputs:
      package:
        type: choice
        options:
        - opentelemetry-instrumentation-genai-anthropic
        - opentelemetry-instrumentation-google-genai
        - opentelemetry-instrumentation-genai-langchain
        - opentelemetry-instrumentation-genai-openai-agents
        - opentelemetry-instrumentation-genai-openai
        - opentelemetry-util-genai
        description: 'Package to be released'
        required: true
permissions:
  contents: read
run-name: "[Package][${{ inputs.package }}] Prepare patch release"

jobs:
  prepare-patch-release:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify prerequisites
        id: verify
        run: |
          on_main=false
          on_backport=false
          case "$GITHUB_REF_NAME" in
            main)
              on_main=true
              ;;
            package-release/${{ inputs.package }}/v*)
              on_backport=true
              ;;
            *)
              echo "Run on main (current minor patch) or package-release/${{ inputs.package }}/v* (backport)"
              exit 1
              ;;
          esac

          echo "on_main=${on_main}" >> "$GITHUB_OUTPUT"
          echo "on_backport=${on_backport}" >> "$GITHUB_OUTPUT"
          echo "PACKAGE_NAME=${{ inputs.package }}" >> "$GITHUB_ENV"

      - name: Set up Python 3.10
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'

      - name: Install tox and towncrier
        run: pip install tox towncrier==25.8.0

      - name: Prepare patch release on main
        if: steps.verify.outputs.on_main == 'true'
        run: ./scripts/prepare_package_for_release.sh "${{ inputs.package }}"

      - name: Prepare patch release on backport branch
        if: steps.verify.outputs.on_backport == 'true'
        run: ./scripts/prepare_package_for_patch_release.sh "${{ inputs.package }}"

      - name: Set pull request title version
        run: |
          version=$(./scripts/eachdist.py version --package "${{ inputs.package }}")
          echo "VERSION=${version}" >> "$GITHUB_ENV"

      - name: Use CLA approved github bot
        run: .github/scripts/use-cla-approved-github-bot.sh

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: otelbot-token
        with:
          app-id: ${{ vars.OTELBOT_APP_ID }}
          private-key: ${{ secrets.OTELBOT_PRIVATE_KEY }}

      - name: Create pull request
        env:
          GITHUB_TOKEN: ${{ steps.otelbot-token.outputs.token }}
        run: |
          message="Prepare patch release for ${PACKAGE_NAME} v${VERSION}"
          branch="otelbot/patch-${PACKAGE_NAME}-v${VERSION}"

          git commit -a -m "$message"
          git push origin HEAD:"$branch"
          gh pr create --title "$message" \
                       --body "$message." \
                       --head "$branch" \
                       --base "$GITHUB_REF_NAME"
